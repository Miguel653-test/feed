<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sources · Cyber intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f3f8f7;
    --border: #dfe8e6;
    --text-primary: #11302e;
    --text-secondary: #5c7472;
    --text-tertiary: #99aaa8;
    --brand-deep: #006864;
    --brand-accent: #00a9a8;
    --ok-bg: #e9f3e3;
    --ok-text: #3d6b2e;
    --err-bg: #fbe9e7;
    --err-text: #9a3324;
    --idle-bg: #f3f8f7;
    --idle-text: #99aaa8;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .page { max-width: 1180px; margin: 0 auto; padding: 32px 24px 64px; }
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
    border-bottom: 1px solid var(--border); padding-bottom: 20px;
  }
  .top h1 { font-size: 22px; font-weight: 600; margin: 0; color: var(--brand-deep); }
  .top .eyebrow {
    font-size: 11px; letter-spacing: 0.08em; color: var(--brand-accent);
    text-transform: uppercase; margin-bottom: 4px; display: block;
  }
  .top .meta { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 10px; }
  .refresh-btn {
    border: 1px solid var(--border); background: var(--bg); border-radius: 8px;
    padding: 6px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer;
    font-family: inherit; text-decoration: none;
  }
  .refresh-btn:hover { border-color: var(--brand-deep); color: var(--brand-deep); }

  .cards { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
  .card {
    flex: 1; min-width: 220px; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; background: var(--surface);
  }
  .card .card-label {
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 8px;
  }
  .card .card-value { font-size: 28px; font-weight: 600; color: var(--brand-deep); font-family: 'IBM Plex Mono', monospace; }
  .card .card-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin: 0 0 12px; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 820px; }
  thead th {
    text-align: left; background: var(--surface); color: var(--text-secondary);
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  .name-cell { font-weight: 500; }
  .name-cell a { color: var(--brand-deep); text-decoration: none; }
  .name-cell a:hover { text-decoration: underline; }
  .type-badge {
    display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--text-secondary); background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; margin-left: 6px;
  }
  .status {
    display: inline-block; font-size: 11px; font-weight: 600; border-radius: 999px; padding: 3px 10px;
  }
  .status.ok { background: var(--ok-bg); color: var(--ok-text); }
  .status.error { background: var(--err-bg); color: var(--err-text); }
  .status.idle { background: var(--idle-bg); color: var(--idle-text); border: 1px dashed var(--border); }
  .status.disabled { background: var(--idle-bg); color: var(--idle-text); }
  .when { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
  .num { font-family: 'IBM Plex Mono', monospace; text-align: right; }
  .err-text { color: var(--err-text); font-size: 11px; max-width: 260px; }
  .loading-state, .error-state, .empty-state { padding: 40px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; }
  .error-state { color: var(--err-text); }
  @media (max-width: 640px) {
    .page { padding: 20px 14px 48px; }
    .top h1 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="top">
    <div>
      <span class="eyebrow">Personal briefing</span>
      <h1>Sources &amp; cost</h1>
    </div>
    <div class="meta mono">
      <span id="metaLine">Loading...</span>
      <a class="refresh-btn" href="index.html">&larr; Briefing</a>
      <button class="refresh-btn" id="refreshBtn" type="button">Refresh</button>
    </div>
  </header>

  <div class="cards">
    <div class="card">
      <div class="card-label">Last run cost</div>
      <div class="card-value" id="lastCost">—</div>
      <div class="card-sub" id="lastRunSub"></div>
    </div>
    <div class="card">
      <div class="card-label">Total cost to date</div>
      <div class="card-value" id="totalCost">—</div>
      <div class="card-sub">Across all recorded runs</div>
    </div>
    <div class="card">
      <div class="card-label">Sources</div>
      <div class="card-value" id="sourceCount">—</div>
      <div class="card-sub" id="sourceSub"></div>
    </div>
  </div>

  <p class="section-label">Source health</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Status</th>
          <th>Last success</th>
          <th class="num">Last run</th>
          <th class="num">Total</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6"><div class="loading-state">Loading sources...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  function escapeHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function safeUrl(raw) {
    try {
      const parsed = new URL(raw, window.location.origin);
      return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : '#';
    } catch (e) {
      return '#';
    }
  }
  function money(n) {
    return '$' + Number(n || 0).toFixed(2);
  }
  function timeAgo(iso) {
    if (!iso) return 'never';
    const diff = Date.now() - new Date(iso).getTime();
    if (diff < 0) return 'just now';
    const mins = Math.round(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + ' min ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.round(hrs / 24);
    return days + 'd ago';
  }

  const tableBody = document.getElementById('tableBody');
  const metaLine = document.getElementById('metaLine');

  function statusFor(s) {
    if (!s.enabled) return '<span class="status disabled">disabled</span>';
    if (s.last_status === 'ok') return '<span class="status ok">ok</span>';
    if (s.last_status === 'error') return '<span class="status error">error</span>';
    return '<span class="status idle">no run yet</span>';
  }

  function render(data) {
    const sources = data.sources || [];

    document.getElementById('lastCost').textContent =
      data.lastRun ? money(data.lastRun.cost_usd) : '—';
    document.getElementById('lastRunSub').textContent = data.lastRun
      ? (timeAgo(data.lastRun.finished_at) + ' · ' + (data.lastRun.new_items || 0) + ' new · ' +
         (data.lastRun.feeds_ok || 0) + ' ok / ' + (data.lastRun.feeds_failed || 0) + ' failed')
      : 'No runs recorded yet';

    document.getElementById('totalCost').textContent = money(data.totalCost);

    const errCount = sources.filter(s => s.enabled && s.last_status === 'error').length;
    document.getElementById('sourceCount').textContent = sources.length;
    document.getElementById('sourceSub').textContent =
      errCount ? (errCount + ' currently failing') : 'All healthy';

    tableBody.innerHTML = '';
    if (sources.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No sources found.</div></td></tr>';
      return;
    }

    sources.forEach(s => {
      const tr = document.createElement('tr');
      const url = safeUrl(s.url);
      const detail = s.last_status === 'error' && s.last_error
        ? '<span class="err-text">' + escapeHtml(s.last_error) + '</span>'
        : '<span class="when">T' + escapeHtml(s.tier) + '</span>';
      tr.innerHTML =
        '<td class="name-cell"><a href="' + url + '" target="_blank" rel="noopener noreferrer">' +
          escapeHtml(s.name) + '</a><span class="type-badge">' + escapeHtml(s.type) + '</span></td>' +
        '<td>' + statusFor(s) + '</td>' +
        '<td class="when">' + escapeHtml(timeAgo(s.last_success_at)) + '</td>' +
        '<td class="num">' + escapeHtml(s.last_run_items || 0) + '</td>' +
        '<td class="num">' + escapeHtml(s.total_items || 0) + '</td>' +
        '<td>' + detail + '</td>';
      tableBody.appendChild(tr);
    });
  }

  function loadData() {
    metaLine.textContent = 'Loading...';
    fetch('/.netlify/functions/get-sources')
      .then(res => {
        if (!res.ok) throw new Error('Request failed with status ' + res.status);
        return res.json();
      })
      .then(data => {
        if (data.error) throw new Error(data.error);
        render(data);
        metaLine.textContent = 'Updated just now';
      })
      .catch(err => {
        metaLine.textContent = 'Failed to load';
        tableBody.innerHTML = '<tr><td colspan="6"><div class="error-state">Could not load sources: ' +
          escapeHtml(err.message) + '</div></td></tr>';
      });
  }

  document.getElementById('refreshBtn').addEventListener('click', loadData);
  loadData();
</script>
</body>
</html>
